name: deprecate-old-attesto

# One-off: deprecate the pre-rename @openmobilehub/attesto-* packages, pointing
# users at the renamed @openmobilehub/attestomcp-*. Runs in CI with the same
# NPM_TOKEN that published (granular token → bypasses 2FA, so no passkey/OTP).
# Trigger:  gh workflow run deprecate.yml -R openmobilehub/attestomcp
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Deprecate @openmobilehub/attesto-gate
        run: npm deprecate "@openmobilehub/attesto-gate@0.1.0" "Renamed - use @openmobilehub/attestomcp-gate instead"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Deprecate @openmobilehub/attesto-storefront
        run: npm deprecate "@openmobilehub/attesto-storefront@0.1.0" "Renamed - use @openmobilehub/attestomcp-storefront instead"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
